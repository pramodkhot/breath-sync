name: Build Android

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-android:
    name: Debug APK + Release AAB + Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Bundle JS into all variants so APKs run standalone without Metro
      - name: Enable JS bundle in debug builds
        run: |
          sed -i 's/^react {/react {\n    debuggableVariants = []/' android/app/build.gradle

      # Decode keystore once — used by both AAB and APK release builds
      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > "$GITHUB_WORKSPACE/android/app/release.keystore"
            echo "KEYSTORE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "KEYSTORE_EXISTS=false" >> $GITHUB_ENV
          fi

      # ── DEBUG APK ──────────────────────────────────────────────────
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── RELEASE AAB (for Play Store) ───────────────────────────────
      - name: Build Release AAB
        env:
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:  ${{ secrets.KEY_ALIAS }}
          KEY_PASS:   ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/android/app/release.keystore"
          if [ "$KEYSTORE_EXISTS" = "true" ]; then
            echo "Building signed AAB for Play Store..."
            cd android && ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
              -Pandroid.injected.signing.store.password="$STORE_PASS" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASS" \
              --no-daemon
          else
            echo "No keystore — building unsigned AAB"
            cd android && ./gradlew bundleRelease --no-daemon
          fi

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 60

      # ── RELEASE APK (for direct install / sideload) ────────────────
      - name: Build Release APK
        env:
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:  ${{ secrets.KEY_ALIAS }}
          KEY_PASS:   ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/android/app/release.keystore"
          if [ "$KEYSTORE_EXISTS" = "true" ]; then
            echo "Building signed release APK..."
            cd android && ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
              -Pandroid.injected.signing.store.password="$STORE_PASS" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASS" \
              --no-daemon
          else
            echo "No keystore — building unsigned release APK"
            cd android && ./gradlew assembleRelease --no-daemon
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/
          retention-days: 60
